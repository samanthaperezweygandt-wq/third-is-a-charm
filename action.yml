name: "Podcast Generator"
author: "Ray Villalobos"
descritption: "Generates a feed for apodcasst from a YAML file"
runs: 
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email: 
    descritption: The commiter's email address
    required: true
    default: ${{github.actor  }}@local host
  name: 
    descritption: The committer's name
    required: true
    default: ${{github.actor}}